[package]
name = "signaler"
version = "0.3.5"
authors = ["Artur Gwoździowski"]
edition = "2024"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
tokio-tungstenite = "0.28"
futures-util = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
colored = "3.1.1"
rand = "0.10.0"

[[bin]]
name ="server"
path ="src/main.rs"

[[bin]]
name ="client"
path ="src/cli.rs"

[[bin]]
name ="answer"
path ="src/answer.rs"

[[bin]]
name ="offer"
path ="src/offer.rs"